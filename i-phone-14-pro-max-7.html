<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./i-phone-14-pro-max-7.css" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM Sans:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space Grotesk:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=SF Pro Text:wght@400&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=SF Pro Display:wght@400&display=swap"
    />
  </head>
  <body>
    <div class="iphone-14-pro-max-7">
      <div class="bg">
        <img class="waves-icon" alt="" src="public/waves.svg" /><img
          class="bg1-icon"
          alt=""
          src="public/bg1.svg"
        /><img class="bg2-icon" alt="" src="public/bg2.svg" /><img
          class="bg2-icon1"
          alt=""
          src="public/bg21.svg"
        />
        <div class="toggle-1-on"></div>
        <img class="led-icon" alt="" src="public/led.svg" /><button
          class="message-parent"
          id="groupButton"
        >
          <img class="message-icon" alt="" />
          <div class="message">Message</div></button
        ><button
          class="iconlylight-outlinearrow-l"
          id="iconlyLightOutlineArrowL"
        >
          <img class="arrow-left-icon" alt="" /></button
        ><img class="image-3-icon" alt="" src="public/image-3@2x.png" /><img
          class="stroke-icon"
          alt=""
        /><img class="bg-child" alt="" src="public/vector-21.svg" />
        <div class="insight">
          <button class="insight-inner" autofocus>
            <div class="rectangle-parent">
              <div class="group-child"></div>
              <div class="group-item"></div>
              <div class="group-inner"></div>
            </div>
          </button>
        </div>
        <button class="insight1" autofocus>
          <div class="insight-child">
            <div class="rectangle-parent">
              <div class="rectangle-div"></div>
              <div class="group-child1"></div>
              <div class="group-child2"></div>
            </div>
          </div>
        </button>
      </div>
      <div class="iphone-14-pro-max-7-child"></div>
      <div class="iphone-14-pro-max-7-item"></div>
      <div class="iphone-14-pro-max-7-inner"></div>
      <img class="right-side-icon" alt="" src="public/right-side.svg" />
      <div class="masters-status-bar-parts-l">
        <div class="time-geo">
          <div class="time">11:39</div>
          <div class="masters-status-bar-parts-a">
            <div class="sb-icon-geo">􀋒</div>
          </div>
        </div>
      </div>
      <img class="vector-icon" alt="" src="public/vector-22.svg" />
      <div class="notification-1-parent">
        <button class="notification-1" autofocus id="notification1">
          <img class="group-icon" alt="" src="public/group.svg" /></button
        ><button class="profile-1" autofocus>
          <img class="group-icon1" alt="" src="public/group1.svg" /></button
        ><img class="ellipse-icon" alt="" src="public/ellipse-737.svg" /><button
          class="ellipse-parent"
        >
          <img class="group-child3" alt="" src="public/ellipse-1.svg" /><img
            class="add-icon"
            alt=""
            src="public/add.svg"
          /></button
        ><button class="category-1" autofocus id="category1">
          <img
            class="home-active-icon"
            alt=""
            src="public/homeactive.svg"
          /></button
        ><button class="insight2" autofocus id="insight1">
          <div class="insight-child">
            <div class="rectangle-parent">
              <div class="group-child"></div>
              <div class="group-item"></div>
              <div class="group-inner"></div>
            </div>
          </div>
        </button>
      </div>
      <div class="iphone-14-pro-max-7-child1"></div>
      <img class="image-3-icon1" alt="" src="public/image-31@2x.png" /><b
        class="swapnamoy-midya"
        ><p class="swapnamoy">Swapnamoy</p>
        <p class="midya">Midya</p></b
      ><img class="stroke-icon1" alt="" src="public/stroke.svg" />
      <div class="distance">Distance</div>
      <div class="day">Day</div>
      <div class="week">Week</div>
      <div class="month">Month</div>
      <div class="year">Year</div>
      <img class="line-icon" alt="" src="public/line-5.svg" /><img
        class="iphone-14-pro-max-7-child2"
        alt=""
        src="public/line-5.svg"
      /><img
        class="iphone-14-pro-max-7-child3"
        alt=""
        src="public/line-5.svg"
      /><img
        class="iphone-14-pro-max-7-child4"
        alt=""
        src="public/line-5.svg"
      /><img
        class="iphone-14-pro-max-7-child5"
        alt=""
        src="public/vector-2.svg"
      /><img
        class="iphone-14-pro-max-7-child6"
        alt=""
        src="public/ellipse-11.svg"
      />
      <div class="div">24/02</div>
      <div class="div1">25/02</div>
      <div class="div2">26/02</div>
      <div class="div3">27/02</div>
      <div class="div4">28/02</div>
      <div class="line-div"></div>
      <div class="div5">0</div>
      <div class="div6">2</div>
      <div class="div7">4</div>
      <div class="div8">6</div>
      <div class="total-distance">Total Distance</div>
      <div class="avg-distance">Avg. Distance</div>
      <div class="km"><span>63.97</span><span class="km1">km</span></div>
      <div class="km2"><span>2.37</span><span class="km1">km</span></div>
    </div>

    <script>
      var groupButton = document.getElementById("groupButton");
      if (groupButton) {
        groupButton.addEventListener("click", function (e) {
          window.location.href = "./i-phone-14-pro-max-4.html";
        });
      }
      
      var iconlyLightOutlineArrowL = document.getElementById(
        "iconlyLightOutlineArrowL"
      );
      if (iconlyLightOutlineArrowL) {
        iconlyLightOutlineArrowL.addEventListener("click", function (e) {
          window.location.href = "./i-phone-14-pro-max-2.html";
        });
      }
      
      var notification1 = document.getElementById("notification1");
      if (notification1) {
        notification1.addEventListener("click", function (e) {
          window.location.href = "./i-phone-14-pro-max-4.html";
        });
      }
      
      var category1 = document.getElementById("category1");
      if (category1) {
        category1.addEventListener("click", function (e) {
          window.location.href = "./i-phone-14-pro-max-2.html";
        });
      }
      
      var insight1 = document.getElementById("insight1");
      if (insight1) {
        insight1.addEventListener("click", function (e) {
          window.location.href = "./i-phone-14-pro-max-3.html";
        });
      }
      </script>
  </body>
</html>
