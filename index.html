<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./index.css" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM Sans:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space Grotesk:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=SF Pro Text:wght@400&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=SF Pro Display:wght@400&display=swap"
    />
  </head>
  <body>
    <div class="iphone-14-pro-max-1">
      <img
        class="iphone-14-pro-max-1-child"
        alt=""
        src="public/vector-221.svg"
      /><img
        class="iphone-14-pro-max-1-item"
        alt=""
        src="public/ellipse-83.svg"
      />
      <div class="sign-up">Sign Up</div>
      <img
        class="iphone-14-pro-max-1-inner"
        alt=""
        src="public/vector-214.svg"
      /><img
        class="iphone-14-pro-max-1-child1"
        alt=""
        src="public/ellipse-102.svg"
      />
      <div class="logo">LOGO</div>
      <div class="iphone-14-pro-max-1-child2"></div>
      <div class="right-title">􀍡</div>
      <div class="or-login-with">Or Login with</div>
      <img class="vector-icon7" alt="" src="public/vector6.svg" /><img
        class="vector-icon8"
        alt=""
        src="public/vector7.svg"
      /><img class="vector-icon9" alt="" src="public/vector8.svg" /><img
        class="vector-icon10"
        alt=""
        src="public/vector9.svg"
      />
      <div class="frame-div"></div>
      <div class="masters-status-bar-parts-l5">
        <div class="top2">
          <div class="time-geo-wrapper">
            <div class="time-geo5">
              <div class="time5">11:39</div>
              <div class="masters-status-bar-parts-a5">
                <div class="sb-icon-geo5">􀋒</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <img class="right-side-icon5" alt="" src="public/right-side5.svg" />
      <div class="sign-up-frame"></div>
      <img class="rectangle-icon" alt="" src="public/rectangle-89.svg" /><img
        class="iphone-14-pro-max-1-child3"
        alt=""
        src="public/rectangle-39319.svg"
      /><img
        class="iphone-14-pro-max-1-child4"
        alt=""
        src="public/rectangle-39320.svg"
      /><img
        class="iphone-14-pro-max-1-child5"
        alt=""
        src="public/rectangle-39321.svg"
      /><input
        class="full-name"
        type="text"
        placeholder="Full Name"
        required
      /><input
        class="email"
        type="email"
        placeholder="Email"
        required
        autofocus
      /><input
        class="username"
        type="text"
        placeholder="username"
        required
      /><input
        class="password"
        type="password"
        placeholder="Password"
        required
      /><img
        class="iphone-14-pro-max-1-child6"
        alt=""
        src="public/rectangle-39322.svg"
      /><input
        class="repeat-password"
        type="password"
        placeholder="Repeat password"
        required
      /><button
        class="iphone-14-pro-max-1-child7"
        autofocus
        id="rectangleButton"
      ></button
      ><button class="login">Login</button>
    </div>

    <script>
      var rectangleButton = document.getElementById("rectangleButton");
      if (rectangleButton) {
        rectangleButton.addEventListener("click", function (e) {
          window.location.href = "./i-phone-14-pro-max-2.html";
        });
      }
      </script>
  </body>
</html>
